<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,700;0,900;1,300&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1080px; background:#ffffff; overflow:hidden; }
  @media screen { html { transform-origin:top left; transform:scale(var(--s,1)); } }
  .page {
    width:1080px; height:1080px;
    padding:70px 80px 60px;
    display:flex; flex-direction:column;
    position:relative;
  }

  .rule-top { width:100%; height:1.5px; background:#111; }
  .header {
    font-family:'Montserrat',sans-serif; font-size:18px; font-weight:300;
    letter-spacing:10px; text-transform:uppercase; color:#111;
    text-align:center; padding:16px 0 15px;
  }
  .rule-top2 { width:100%; height:0.8px; background:#111; }

  .title-wrap {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    position:relative;
  }
  .ghost {
    position:absolute;
    font-family:'Montserrat',sans-serif; font-size:520px; font-weight:900;
    color:rgba(0,0,0,0.04); line-height:1;
    top:50%; left:50%; transform:translate(-50%,-50%);
    pointer-events:none; user-select:none;
  }
  /* Bottom Turns: título en 2 líneas para que quepa */
  .title-block { text-align:center; position:relative; z-index:1; }
  .line1 {
    display:flex; align-items:baseline; justify-content:center;
  }
  .big-letter {
    font-family:'Montserrat',sans-serif;
    font-size:240px; font-weight:900; color:#111;
    line-height:1; letter-spacing:-4px;
  }
  .rest {
    font-family:'Montserrat',sans-serif;
    font-size:72px; font-weight:200; color:#111;
    letter-spacing:10px; margin-left:8px; padding-bottom:10px;
  }
  .line2 {
    font-family:'Montserrat',sans-serif;
    font-size:72px; font-weight:200; color:#111;
    letter-spacing:18px; text-transform:uppercase;
    margin-top:-12px;
  }

  .rule-mid { width:100%; height:1px; background:#111; margin-top:36px; margin-bottom:26px; }
  .meta { display:flex; align-items:center; justify-content:center; gap:12px; }
  .meta-label {
    font-family:'Montserrat',sans-serif; font-size:18px; font-weight:300;
    letter-spacing:6px; text-transform:uppercase; color:#999;
  }
  .meta-num {
    font-family:'Montserrat',sans-serif; font-size:18px; font-weight:300;
    letter-spacing:6px; color:#999;
  }
  .subtitle {
    font-family:'Montserrat',sans-serif; font-size:20px; font-weight:300;
    font-style:italic; color:#666; line-height:1.7;
    text-align:center; margin-top:22px;
  }

  .rule-bot { width:100%; height:0.8px; background:#111; margin-bottom:24px; }
  .bottom { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .logo-img { width:72px; height:72px; object-fit:contain; filter:grayscale(100%); }
  .brand {
    font-family:'Montserrat',sans-serif; font-size:14px; font-weight:300;
    letter-spacing:5px; text-transform:uppercase; color:#bbb;
  }
</style>
</head>
<body>
<div class="page">
  <div class="rule-top"></div>
  <div class="header">The Coach Eye</div>
  <div class="rule-top2"></div>

  <div class="title-wrap">
    <div class="ghost">B</div>
    <div class="title-block">
      <div class="line1">
        <span class="big-letter">B</span>
        <span class="rest">OTTOM</span>
      </div>
      <div class="line2">Turns</div>
    </div>
    <div class="rule-mid"></div>
    <div class="meta">
      <span class="meta-label">Notes</span>
      <span class="meta-num">#03</span>
    </div>
    <div class="subtitle">Consideraciones técnicas para<br>profesores de surf y surf coaches</div>
  </div>

  <div class="rule-bot"></div>
  <div class="bottom">
    <img class="logo-img" src="logo-m.png" alt="Metasurfing"/>
    <span class="brand">Metasurfing Books</span>
  </div>
</div>
<script>var s=Math.min(window.innerWidth/1080,window.innerHeight/1080);document.documentElement.style.setProperty("--s",s);window.addEventListener("resize",function(){var s=Math.min(window.innerWidth/1080,window.innerHeight/1080);document.documentElement.style.setProperty("--s",s);});</script>
</body>
</html>
