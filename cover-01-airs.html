<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:595px; height:842px; background:#f5f2ec; overflow:hidden; }
  .page { width:595px; height:842px; padding:52px 56px 46px; display:flex; flex-direction:column; position:relative; }

  .top-rule { width:100%; height:0.8px; background:#2a2a2a; margin-bottom:10px; }
  .header {
    font-family:'Inter',sans-serif; font-size:9.5px; font-weight:300;
    letter-spacing:5px; text-transform:uppercase; color:#2a2a2a;
    text-align:center; margin-bottom:10px;
  }
  .top-rule2 { width:100%; height:0.4px; background:#2a2a2a; }

  .title-wrap { margin-top:auto; position:relative; line-height:1; }
  .ghost-letter {
    position:absolute; font-family:'Cormorant Garamond',Georgia,serif;
    font-size:280px; font-weight:300; color:rgba(0,0,0,0.07);
    top:-30px; left:-8px; line-height:1; pointer-events:none;
  }
  .title-line { display:flex; align-items:baseline; position:relative; z-index:1; }
  .big-letter {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:148px; font-weight:300; color:#1a1a1a; line-height:1; letter-spacing:-2px;
  }
  .rest-letters {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:52px; font-weight:300; color:#1a1a1a; letter-spacing:5px;
    margin-left:6px; margin-bottom:10px;
  }

  .mid-rule { width:100%; height:0.6px; background:#2a2a2a; margin-top:18px; margin-bottom:14px; }
  .meta { display:flex; justify-content:space-between; align-items:baseline; }
  .tech-label {
    font-family:'Inter',sans-serif; font-size:9px; font-weight:300;
    letter-spacing:4px; text-transform:uppercase; color:#999;
  }
  .note-num {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:20px; font-weight:300; font-style:italic; color:#999;
  }
  .subtitle {
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:18px; font-weight:300; font-style:italic;
    color:#555; line-height:1.65; margin-top:28px; letter-spacing:0.3px;
  }

  .spacer { flex:1; }
  .bottom-rule { width:100%; height:0.4px; background:#2a2a2a; margin-bottom:18px; }
  .bottom-area { display:flex; align-items:center; gap:14px; }
  .logo-img { width:42px; height:42px; object-fit:contain; filter:grayscale(100%); }
  .brand {
    font-family:'Inter',sans-serif; font-size:8.5px; font-weight:300;
    letter-spacing:3.5px; text-transform:uppercase; color:#bbb;
  }
</style>
</head>
<body>
<div class="page">
  <div class="top-rule"></div>
  <div class="header">The Coach Eye</div>
  <div class="top-rule2"></div>

  <div class="title-wrap">
    <div class="ghost-letter">A</div>
    <div class="title-line">
      <span class="big-letter">A</span>
      <span class="rest-letters">IRS</span>
    </div>
  </div>

  <div class="mid-rule"></div>
  <div class="meta">
    <span class="tech-label">Technical Note</span>
    <span class="note-num">#01</span>
  </div>
  <div class="subtitle">
    Consideraciones técnicas para<br>profesores de surf y surf coaches
  </div>

  <div class="spacer"></div>
  <div class="bottom-rule"></div>
  <div class="bottom-area">
    <img class="logo-img" src="logo-m.png" alt="Metasurfing Books"/>
    <span class="brand">Metasurfing Books</span>
  </div>
</div>
</body>
</html>
