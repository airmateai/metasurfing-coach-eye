<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:595px; height:842px; background:#ffffff; overflow:hidden; }
  .page { width:595px; height:842px; padding:52px 56px 46px; display:flex; flex-direction:column; align-items:center; position:relative; }

  .top-rule  { width:100%; height:0.8px; background:#1a1a1a; margin-bottom:10px; }
  .header    { font-family:'Montserrat',sans-serif; font-size:9px; font-weight:300; letter-spacing:5px; text-transform:uppercase; color:#1a1a1a; text-align:center; margin-bottom:10px; }
  .top-rule2 { width:100%; height:0.4px; background:#1a1a1a; }

  .title-wrap { margin-top:auto; position:relative; line-height:1; text-align:center; width:100%; }
  .ghost-letter { position:absolute; font-family:'Montserrat',sans-serif; font-size:260px; font-weight:700; color:rgba(0,0,0,0.05); top:-20px; left:50%; transform:translateX(-50%); line-height:1; pointer-events:none; }
  .title-line { display:flex; align-items:baseline; justify-content:center; position:relative; z-index:1; }
  .big-letter  { font-family:'Montserrat',sans-serif; font-size:140px; font-weight:700; color:#1a1a1a; line-height:1; letter-spacing:-2px; }
  .rest-letters{ font-family:'Montserrat',sans-serif; font-size:48px; font-weight:300; color:#1a1a1a; letter-spacing:8px; margin-left:4px; margin-bottom:8px; }

  .mid-rule { width:100%; height:0.6px; background:#1a1a1a; margin-top:18px; margin-bottom:14px; }

  .meta { display:flex; justify-content:center; align-items:baseline; gap:6px; }
  .tech-label { font-family:'Montserrat',sans-serif; font-size:9px; font-weight:300; letter-spacing:4px; text-transform:uppercase; color:#888; }
  .note-num   { font-family:'Montserrat',sans-serif; font-size:9px; font-weight:300; letter-spacing:4px; color:#888; }

  .subtitle { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:300; font-style:italic; color:#555; line-height:1.7; margin-top:22px; letter-spacing:0.3px; text-align:center; }

  .spacer { flex:1; }
  .bottom-rule { width:100%; height:0.4px; background:#1a1a1a; margin-bottom:18px; }
  .bottom-area { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .logo-img { width:40px; height:40px; object-fit:contain; filter:grayscale(100%); }
  .brand    { font-family:'Montserrat',sans-serif; font-size:8px; font-weight:300; letter-spacing:3.5px; text-transform:uppercase; color:#aaa; }
</style>
</head>
<body>
<div class="page">
  <div class="top-rule"></div>
  <div class="header">The Coach Eye</div>
  <div class="top-rule2"></div>

  <div class="title-wrap">
    <div class="ghost-letter">A</div>
    <div class="title-line">
      <span class="big-letter">A</span>
      <span class="rest-letters">IRS</span>
    </div>
  </div>

  <div class="mid-rule"></div>
  <div class="meta">
    <span class="tech-label">Notes</span>
    <span class="note-num">#01</span>
  </div>
  <div class="subtitle">
    Consideraciones técnicas para<br>profesores de surf y surf coaches
  </div>

  <div class="spacer"></div>
  <div class="bottom-rule"></div>
  <div class="bottom-area">
    <img class="logo-img" src="logo-m.png" alt="Metasurfing Books"/>
    <span class="brand">Metasurfing Books</span>
  </div>
</div>
</body>
</html>
